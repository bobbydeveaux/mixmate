name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-dmg:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        run: |
          chmod +x scripts/build-dmg.sh
          bash scripts/build-dmg.sh "${{ steps.version.outputs.version }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MixMate ${{ github.ref_name }}"
          body: |
            ## MixMate ${{ github.ref_name }}

            Per-app volume control for macOS. Lives in your menu bar.

            ### What's new in 1.1.0
            - **Chrome & Electron app support** — helper/renderer processes (Chrome, Slack, Discord, VS Code…) now appear correctly with the right name and icon
            - **Fixed audio distortion** — IOProc buffer corruption on non-interleaved (multi-buffer) audio streams caused crackling; fixed with proper pointer arithmetic
            - **Fixed Gatekeeper "damaged" error** — app is now ad-hoc signed so macOS shows the standard "unidentified developer" prompt instead

            ### Install
            1. Download `MixMate-${{ steps.version.outputs.version }}.dmg`
            2. Open the DMG and drag MixMate to your Applications folder
            3. **First launch:** right-click MixMate.app → Open (Gatekeeper workaround for unsigned builds)
            4. Grant microphone access when prompted — required for the audio tap API

            **Requires macOS Sonoma 14.2 or later.**
          files: "MixMate-${{ steps.version.outputs.version }}.dmg"
